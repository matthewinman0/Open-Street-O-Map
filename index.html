<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Open Street O-Map</title>
<link rel="icon" type="image/x-icon" href="assets/OSOM.ico">
<meta name="description" content="Orienteering map version of Open Street Map, OSOM">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/maplibre-gl/4.7.1/maplibre-gl.min.css"/>
<script src="./libs/maplibre-gl.min.js"></script>
<script src="./libs/proj4.min.js"></script>

<link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="map"></div>

<div id="ui-wrapper">
  <button name="Settings panel open" id="settings-toggle">
    <svg id="svg-settings" width="20px" height="60px" viewBox="-19.04 0 75.804 75.804" xmlns="http://www.w3.org/2000/svg">
  <g id="Group_65" data-name="Group 65" transform="translate(-831.568 -384.448)">
    <path
      id="Path_57"
      d="M833.068,460.252a1.5,1.5,0,0,1-1.061-2.561l33.557-33.56a2.53,2.53,0,0,0,0-3.564l-33.557-33.558a1.5,1.5,0,0,1,2.122-2.121l33.556,33.558a5.53,5.53,0,0,1,0,7.807l-33.557,33.56A1.5,1.5,0,0,1,833.068,460.252Z"
      fill="none"
      stroke="#000000"
      stroke-width="6"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
</svg>
  </button>

  <div id="settings-panel">
    <button name="Map Settings" id="map-settings-btn" class="button">Map</button>
    <button name="Tools" id="tools-settings-btn" class="button">Tools</button>
    <button name="Export" id="export-settings-btn" class="button">Export</button>
    <button name="Close Settings" id="close-settings-btn">x</button>



    <div id="map-settings">
      <h2 style="justify-content: center; display: flex;">Map Settings</h2>

      <p>O-style: <select name="O-style" id="style-select">
        <option value="Forest">Forest</option>
        <option value="Sprint">Sprint</option>
      </select></p>

      <p>Contour Type: <select name="Contour Type" id="contour-type">
        <option value="mapterhorn">Mapterhorn</option>
        <option value="amazon">AWS Terrarium</option>
        <option value="none">None</option>
      </select></p>

      <p>Terrain Exaggeration: <input name="Terrain Exaggeration" type="number" id="terrain-exaggeration" name="terrain-exaggeration" step="0.1" value="1" max="5" min="0"></p>

      <p>3d Buildings:<input name="3d Buildings toggle" type="checkbox" id="3d-buildings-toggle"></p>
    </div>



    <div id="tools-settings" style="display: none;">
      <h2 style="justify-content: center; display: flex;">Tools</h2>
      <details>
      <summary><h3 style="display: inline-block;">Map Overlay</h3></summary>

      <p>Upload Map: <input type="file" id="uploaded-map" class="upload-button"></p>
      <p>Upload GeoRef: <input type="file" id="uploaded-pgw" class="upload-button"></p>

      <button name="Display Map" id="display-uploaded-map" class="button">Display</button>
      <button name="Clear Maps" id="clear-uploaded-map" class="button">Clear</button>
      </details>
    </div>


    <div id="export-settings" style="display: none;">
      <h2 style="justify-content: center; display: flex;">Export</h2>
      <p><button name="Select export area" id="export-select-btn" class="button">Select Area</button></p>

      <p><label for="scale-select">Scale:</label>
      <select id="scale-select">
        <option value="10000">1:10,000</option>
        <option value="5000">1:5,000</option>
        <option value="7500">1:7,500</option>
        <option value="15000">1:15,000</option>
      </select></p>

      <p><label for="page-size">Page Size:</label>
      <select id="page-size">
        <option value="A4">A4</option>
        <option value="A3">A3</option>
        <option value="A2">A2</option>
      </select></p>

      <p><label for="dpi">Zoom "DPI":</label>

      <input type="number" id="dpi" name="export-dpi" step="1" value="300" min="1"></p>

      <button name="export" id="export-btn" class="button">Export</button>
    </div>

    <footer style="font-size: 0.8em; text-align: left; bottom: 10px; position: absolute; padding: 0px;">
      <a href="https://github.com/matthewinman0/Open-Street-O-Map">Github</a>
      <a href="./about/" style="padding-left: 10px;">About</a>
      <br>
      <a href="https://openfreemap.org/">OSM Tiles</a>
      <a href="https://mapterhorn.com/">Mapterhorn Terrain</a>
      <a href="https://registry.opendata.aws/terrain-tiles/">AWS Terrarium</a>
    </footer>
      
  </div>
</div>

<div id="hud">Zoom: -- | X: -- | Y: --</div>

<script src="./libs/maplibre-contour.min.js"></script>
<script type="module" src="main.js"></script>
<script src="./export.js"></script>
<script src="./Tools/overlay.js"></script>
<script src="./settings.js"></script>

</body>
</html>
