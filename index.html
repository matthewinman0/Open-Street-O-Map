<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Custom MapLibre Style</title>

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<style>
  body { margin: 0; }
  #map { width: 100vw; height: 100vh; }
</style>
</head>

<body>

<div id="map"></div>
<button id="toggle3d" onclick="toggleBuildings()" style="
  position:absolute;
  z-index:1;
  top:10px;
  left:10px;
  padding:8px;
">
Toggle 3D
</button>

<script>
let is3D = true;

function toggleBuildings() {
  is3D = !is3D;

  map.setLayoutProperty(
    "buildings-3d",
    "visibility",
    is3D ? "visible" : "none"
  );

  map.setLayoutProperty(
    "buildings-2d",
    "visibility",
    is3D ? "none" : "visible"
  );
}

const map = new maplibregl.Map({
  container: "map",
  style: "./style.json",
  center: [-3.9642, 56.1884],
  zoom: 14
});

map.on("load", () => {

  // 🔥 FORCE VECTOR SOURCE (fixes most issues)
  map.addSource("buildings", {
    type: "vector",
    tiles: [
      "https://api.maptiler.com/tiles/v3/{z}/{x}/{y}.pbf?key=SOSAfSwTZ8G9yYdNtF8Z"
    ]
  });


  map.addControl(new maplibregl.NavigationControl());

});

</script>

</body>
</html>
