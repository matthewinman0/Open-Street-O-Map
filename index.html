<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Open Street O-Map</title>
<meta name="description" content="Orienteering map version of Open Street Map, OSOM">

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<link rel="stylesheet" href="./style.css">
</head>
<body>

<div id="map"></div>

<div id="ui-wrapper">
  <button id="settings-toggle">
    <svg id="svg-settings" width="20px" height="60px" viewBox="-19.04 0 75.804 75.804" xmlns="http://www.w3.org/2000/svg">
  <g id="Group_65" data-name="Group 65" transform="translate(-831.568 -384.448)">
    <path
      id="Path_57"
      d="M833.068,460.252a1.5,1.5,0,0,1-1.061-2.561l33.557-33.56a2.53,2.53,0,0,0,0-3.564l-33.557-33.558a1.5,1.5,0,0,1,2.122-2.121l33.556,33.558a5.53,5.53,0,0,1,0,7.807l-33.557,33.56A1.5,1.5,0,0,1,833.068,460.252Z"
      fill="none"
      stroke="#000000"
      stroke-width="6"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
  </g>
</svg>
  </button>

  <div id="settings-panel">
    <button id="map-settings-btn">Map</button>
    <button id="tools-settings-btn">Tools</button>
    <button id="export-settings-btn">Export</button>
    <button id="close-settings-btn">x</button>
    <div id="map-settings">
      <h3>Settings IN PROGRESS</h3>
      <p>Example settings: <input type="text" id="example-setting" name="example-setting"></p>
      <p>Another example setting: <input type="checkbox" id="example-checkbox" name="example-checkbox"></p>
      <p>Terrain Exaggeration: <input type="number" id="terrain-exaggeration" name="terrain-exaggeration" step="0.1" value="1" max="5" min="0"></p>
      <p>Example color setting: <input type="color" id="example-color" name="example-color" value="#ff0000"></p>
    </div>
    <div id="tools-settings" style="display: none;">
      <h3>Tools IN PROGRESS</h3>
      <p>Example tool setting: <input type="text" id="example-tool-setting" name="example-tool-setting"></p>
    </div>
    <div id="export-settings" style="display: none;">
      <h3>Export IN PROGRESS</h3>
      <p>Example export setting: <input type="text" id="example-export-setting" name="example-export-setting"></p>
    </div>
  </div>
</div>

<div id="hud">Zoom: -- | Contour: -- m</div>

<script src="./main.js"></script>

</body>
</html>
